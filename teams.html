<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="https://oddo-x-adani-hackaton.vercel.app/">
    <title>Teams - GearGuard</title>
    <link rel="stylesheet" href="frontend/css/premium-scroll.css">
    <link rel="stylesheet" href="frontend/css/app.css">
    <link rel="stylesheet" href="frontend/css/teams.css">
</head>

<body class="app-page">
    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>

    <!-- Premium Header -->
    <header class="premium-header" id="header">
        <a href="index.html" class="header-logo">
            <span class="logo-icon">🛡️</span>
            <span class="logo-text">GEARGUARD</span>
        </a>

        <nav class="header-nav">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="equipment.html" class="nav-link">Equipment</a>
            <a href="teams.html" class="nav-link active">Teams</a>
            <a href="requests.html" class="nav-link">Requests</a>
            <a href="calendar.html" class="nav-link">Calendar</a>
            <div class="user-menu">
                <span class="user-name" id="userName">User</span>
                <button class="btn-logout" onclick="Auth.logout()">🚪 Logout</button>
            </div>
        </nav>

        <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
    </header>

    <!-- Main Content -->
    <main class="app-main">
        <div class="page-header">
            <div>
                <h1 class="page-title">👥 Maintenance Teams</h1>
                <p class="page-subtitle">Manage teams and team members</p>
            </div>
        </div>

        <!-- Teams Grid -->
        <section class="teams-grid" id="teamsGrid">
            <div class="loading-spinner">
                <div class="spinner"></div>
            </div>
        </section>
    </main>

    <script src="frontend/js/shared.js"></script>
    <script src="frontend/js/shared.js"></script>
    <script src="frontend/js/teams.js"></script>

    <!-- UI Effects Script -->
    <script>
        // Custom Cursor
        const cursor = document.querySelector('.custom-cursor');
        if (cursor) {
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
            document.querySelectorAll('a, button, .glass-card').forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
            });
        }

        // Header Scroll Effect
        const header = document.getElementById('header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // Mobile Menu Toggle
        const menuToggle = document.getElementById('menuToggle');
        const headerNav = document.querySelector('.header-nav');
        if (menuToggle) {
            menuToggle.addEventListener('click', () => {
                menuToggle.classList.toggle('active');
                headerNav.classList.toggle('active');
            });
        }
    </script>
</body>

</html>
