<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="https://oddo-x-adani-hackaton.vercel.app/">
    <title>Login - GearGuard</title>
    <link rel="stylesheet" href="frontend/css/premium-scroll.css">
    <link rel="stylesheet" href="frontend/css/auth.css">
</head>

<body class="auth-page">
    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>

    <!-- Background Effects -->
    <div class="auth-bg">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="floating-gear gear-1">⚙️</div>
        <div class="floating-gear gear-2">🔧</div>
    </div>

    <div class="auth-container">
        <!-- Logo -->
        <a href="index.html" class="auth-logo">
            <span class="logo-icon">🛡️</span>
            <span class="logo-text">GEARGUARD</span>
        </a>

        <!-- Auth Card -->
        <div class="glass-card auth-card">
            <!-- Tab Switcher -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Sign In</button>
                <button class="auth-tab" data-tab="register">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <h2>Welcome Back</h2>
                <p class="auth-subtitle">Sign in to your maintenance dashboard</p>

                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" name="email" required placeholder="alice@gearguard.com">
                    <span class="field-error" id="loginEmailError"></span>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="password" required
                        placeholder="Enter your password">
                    <span class="field-error" id="loginPasswordError"></span>
                </div>

                <div class="form-error" id="loginError"></div>

                <button type="submit" class="btn-primary btn-submit">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader"></span>
                </button>

                <p class="auth-hint">
                    Demo: alice@gearguard.com / password
                </p>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form">
                <h2>Create Account</h2>
                <p class="auth-subtitle">Join the maintenance management system</p>

                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" name="name" required placeholder="John Doe">
                    <span class="field-error" id="regNameError"></span>
                </div>

                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" name="email" required placeholder="john@company.com">
                    <span class="field-error" id="regEmailError"></span>
                </div>

                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" name="password" required placeholder="Min 6 characters"
                        minlength="6">
                    <span class="field-error" id="regPasswordError"></span>
                </div>

                <div class="form-group">
                    <label for="regRole">Role</label>
                    <select id="regRole" name="role" required>
                        <option value="user">User (Request Only)</option>
                        <option value="technician">Technician</option>
                        <option value="manager">Manager</option>
                    </select>
                </div>

                <div class="form-error" id="registerError"></div>

                <button type="submit" class="btn-primary btn-submit">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader"></span>
                </button>
            </form>
        </div>

        <p class="auth-footer">
            <a href="index.html">← Back to Home</a>
        </p>
    </div>

    <script src="frontend/js/shared.js"></script>
    <script src="frontend/js/login.js"></script>

    <!-- UI Effects Script -->
    <script>
        // Custom Cursor
        const cursor = document.querySelector('.custom-cursor');
        if (cursor) {
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
            document.querySelectorAll('a, button, .glass-card, input, select').forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
            });
        }
    </script>
</body>

</html>
